<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Delete Post</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1e293b; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        nav .brand { font-weight: 600; font-size: 1.1rem; }
        nav .nav-links { display: flex; align-items: center; gap: 1.25rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; }
        nav a:hover, nav a.active { color: #fff; }
        nav form { display: inline; }
        nav button { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.3rem 0.75rem; border-radius: 4px; cursor: pointer; }
        .container { max-width: 640px; margin: 1.5rem auto; padding: 0 1rem; }
        .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.25rem; }
        h1 { font-size: 1.4rem; color: #991b1b; margin-bottom: 0.75rem; }
        p { color: #475569; line-height: 1.5; margin-bottom: 1rem; }
        .post-title { font-weight: 700; color: #1e293b; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 0.5rem 0.9rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; text-decoration: none; font-size: 0.875rem; cursor: pointer; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        @media (max-width: 700px) { nav { align-items: flex-start; flex-direction: column; gap: 0.75rem; } nav .nav-links { flex-wrap: wrap; } }
    </style>
</head>
<body th:classappend="${darkMode} ? 'dark-mode' : ''">
    <nav>
        <span class="brand">Flux</span>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}" class="active">Posts</a>
            <a th:href="@{/users}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <form class="theme-toggle" th:action="@{/theme/toggle}" method="post"><button type="submit" th:text="${darkMode} ? 'Light mode' : 'Dark mode'">Dark mode</button></form>
            <form th:action="@{/logout}" method="post"><button type="submit">Sign out</button></form>
        </div>
    </nav>
    <main class="container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <section class="panel">
            <h1>Delete Post</h1>
            <p>Delete <span class="post-title" th:text="${post.title}">this post</span>? This action cannot be undone.</p>
            <div class="actions">
                <form method="post" th:action="@{/posts/{id}/delete(id=${post.id})}">
                    <button class="btn btn-danger" type="submit">Delete</button>
                </form>
                <a class="btn btn-secondary" th:href="@{/posts/{id}(id=${post.id})}">Cancel</a>
            </div>
        </section>
    </main>
</body>
</html>
