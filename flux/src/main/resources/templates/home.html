<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Home</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        nav {
            background: #1e293b;
            color: #fff;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav .brand { font-weight: 600; font-size: 1.1rem; }
        nav .nav-links { display: flex; align-items: center; gap: 1.25rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.15s; }
        nav a:hover { color: #fff; }
        nav a.active { color: #fff; font-weight: 500; }
        nav .user-info { font-size: 0.8rem; color: #94a3b8; }
        nav form { display: inline; }
        nav button {
            background: none; border: 1px solid #475569; color: #94a3b8;
            padding: 0.3rem 0.75rem; border-radius: 4px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.15s;
        }
        nav button:hover { border-color: #94a3b8; color: #fff; }

        .container {
            max-width: 960px;
            margin: 3rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2.5rem;
            display: inline-block;
        }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body th:classappend="${darkMode} ? 'dark-mode' : ''">
    <nav>
        <span class="brand">Flux</span>
        <div class="nav-links">
            <a th:href="@{/}" class="active">Home</a>
            <a th:href="@{/posts}">Posts</a>
            <a th:href="@{/users}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <span class="user-info">Signed in as <strong sec:authentication="name">user</strong></span>
            <form class="theme-toggle" th:action="@{/theme/toggle}" method="post">
                <button type="submit" th:text="${darkMode} ? 'Light mode' : 'Dark mode'">Dark mode</button>
            </form>
            <form th:action="@{/logout}" method="post">
                <button type="submit">Sign out</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Welcome to Flux</h1>
            <p>You are signed in as <strong sec:authentication="name">user</strong>.</p>
            <a th:href="@{/posts}" class="btn">View Posts</a>
            <a th:href="@{/users}" class="btn" sec:authorize="hasRole('ADMIN')">Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
