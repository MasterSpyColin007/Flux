<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Flux - ' + ${post.title}">Flux - Post</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1e293b; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        nav .brand { font-weight: 600; font-size: 1.1rem; }
        nav .nav-links { display: flex; align-items: center; gap: 1.25rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; }
        nav a:hover, nav a.active { color: #fff; }
        nav form { display: inline; }
        nav button { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.3rem 0.75rem; border-radius: 4px; cursor: pointer; }
        .container { max-width: 820px; margin: 1.5rem auto; padding: 0 1rem; }
        .post { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .post-media { width: 100%; max-height: 460px; object-fit: cover; display: block; background: #e2e8f0; }
        .post-body { padding: 1.25rem; }
        .post-meta { color: #64748b; font-size: 0.875rem; margin-bottom: 0.5rem; }
        h1 { font-size: 1.6rem; color: #1e293b; margin-bottom: 0.75rem; }
        .post-content { color: #334155; line-height: 1.6; white-space: pre-wrap; margin-bottom: 1rem; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 0.5rem 0.9rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; text-decoration: none; font-size: 0.875rem; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        @media (max-width: 700px) { nav { align-items: flex-start; flex-direction: column; gap: 0.75rem; } nav .nav-links { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Flux</span>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}" class="active">Posts</a>
            <a th:href="@{/users}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <form th:action="@{/logout}" method="post"><button type="submit">Sign out</button></form>
        </div>
    </nav>
    <main class="container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <article class="post">
            <img th:if="${post.imageUrl}" class="post-media" th:src="${post.imageUrl}" alt="Post image">
            <div class="post-body">
                <div class="post-meta">
                    <span th:text="${post.author.username}">author</span>
                    <span th:text="${#temporals.format(post.createdAt, 'MMM d, yyyy h:mm a')}">date</span>
                </div>
                <h1 th:text="${post.title}">Post title</h1>
                <div class="post-content" th:text="${post.content}">Post content</div>
                <div class="actions">
                    <a class="btn btn-secondary" th:href="@{/posts}">Back</a>
                    <a class="btn" th:href="@{/posts/{id}/edit(id=${post.id})}" th:if="${post.author.username == #authentication.name}">Edit</a>
                    <a class="btn btn-secondary" th:href="@{/posts/{id}/delete(id=${post.id})}" th:if="${post.author.username == #authentication.name}">Delete</a>
                </div>
            </div>
        </article>
    </main>
</body>
</html>
