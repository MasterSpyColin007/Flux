<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux - Posts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1e293b; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        nav .brand { font-weight: 600; font-size: 1.1rem; }
        nav .nav-links { display: flex; align-items: center; gap: 1.25rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; }
        nav a:hover, nav a.active { color: #fff; }
        nav form { display: inline; }
        nav button { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.3rem 0.75rem; border-radius: 4px; cursor: pointer; }
        .container { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 1rem; }
        h1 { font-size: 1.5rem; color: #1e293b; }
        .btn { display: inline-block; padding: 0.5rem 0.9rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; text-decoration: none; font-size: 0.875rem; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .post-list { display: grid; gap: 1rem; }
        .post-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .post-media { width: 100%; max-height: 320px; object-fit: cover; display: block; background: #e2e8f0; }
        .post-body { padding: 1rem; }
        .post-meta { color: #64748b; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .post-title { color: #1e293b; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .post-content { color: #475569; line-height: 1.5; margin-bottom: 0.75rem; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .empty-state { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 2rem; text-align: center; color: #64748b; }
        @media (max-width: 700px) { nav { align-items: flex-start; flex-direction: column; gap: 0.75rem; } nav .nav-links, .page-header { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Flux</span>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}" class="active">Posts</a>
            <a th:href="@{/users}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <form th:action="@{/logout}" method="post"><button type="submit">Sign out</button></form>
        </div>
    </nav>
    <main class="container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="page-header">
            <h1>Posts</h1>
            <a class="btn" th:href="@{/posts/create}">Create Post</a>
        </div>
        <section class="post-list" th:if="${!posts.isEmpty()}">
            <article class="post-card" th:each="post : ${posts}">
                <img th:if="${post.imageUrl}" class="post-media" th:src="${post.imageUrl}" alt="Post image">
                <div class="post-body">
                    <div class="post-meta">
                        <span th:text="${post.author.username}">author</span>
                        <span th:text="${#temporals.format(post.createdAt, 'MMM d, yyyy h:mm a')}">date</span>
                    </div>
                    <h2 class="post-title" th:text="${post.title}">Post title</h2>
                    <p class="post-content" th:text="${post.content}">Post content</p>
                    <div class="actions">
                        <a class="btn" th:href="@{/posts/{id}(id=${post.id})}">View</a>
                        <a class="btn btn-secondary" th:href="@{/posts/{id}/edit(id=${post.id})}" th:if="${post.author.username == #authentication.name}">Edit</a>
                        <a class="btn btn-secondary" th:href="@{/posts/{id}/delete(id=${post.id})}" th:if="${post.author.username == #authentication.name}">Delete</a>
                    </div>
                </div>
            </article>
        </section>
        <div th:if="${posts.isEmpty()}" class="empty-state">No posts yet.</div>
    </main>
</body>
</html>
